<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Update Student</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">

<h2 class="text-2xl font-bold mb-6 text-center">Update Student</h2>

<form method="POST">
{% csrf_token %}

<div class="mb-4">
  <label class="block mb-1 font-medium">Name</label>
  <input type="text" name="input_name" value="{{ student.name }}" required
  class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
</div>

<div class="mb-4">
  <label class="block mb-1 font-medium">Email</label>
  <input type="email" name="input_email" value="{{ student.email }}" required
  class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
</div>

<div class="mb-6">
  <label class="block mb-1 font-medium">Phone</label>
  <input type="text" name="input_phone" value="{{ student.phone }}" required
  class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
</div>

<!-- ✅ Yahi fix hai — proper submit button -->
<button type="submit"
  class="w-full bg-yellow-500 text-white py-2 rounded-lg hover:bg-yellow-600">
  Update Student
</button>

</form>

</div>

</body>
</html>
